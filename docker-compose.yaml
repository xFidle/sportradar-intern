services:
  database:
    container_name: sportradar-database
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dev 
      POSTGRES_USER: user 
      POSTGRES_PASSWORD: password 
    volumes:
      - sportradar-data:/var/lib/postgresql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro,z
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro,z
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dev"]
      interval: 10s
      timeout: 5s 
      retries: 3

  server:
    container_name: sportradar-server
    ports:
      - "8080:8080"
    build:
      context: ./server
      dockerfile: dockerfile
    env_file:
      - ./server/.env
    depends_on:
      database:
        condition: service_healthy
      fileserver:
        condition: service_healthy
    restart: unless-stopped

  fileserver:
    container_name: sportradar-fileserver
    image: busybox:latest 
    ports:
      - "9000:9000"
    volumes:
      - ./storage:/www:ro,z
    command: httpd -f -p 9000 -h /www
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- localhost:9000/ > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s 
      retries: 3

volumes:
  sportradar-data:

