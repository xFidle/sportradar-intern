services:
  database:
    container_name: sportradar-database
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dev 
      POSTGRES_USER: user 
      POSTGRES_PASSWORD: password 
    volumes:
      - sportradar-data:/var/lib/postgresql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro,z
      - ./database/indexes.sql:/docker-entrypoint-initdb.d/02-indexes.sql:ro,z
      - ./database/seed.sql:/docker-entrypoint-initdb.d/03-seed.sql:ro,z
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dev"]
      interval: 10s
      timeout: 5s 
      retries: 3

  fileserver:
    container_name: sportradar-fileserver
    image: nginx:alpine 
    volumes:
      - ./storage:/usr/share/nginx/html:ro,z
    networks:
      - app
    restart: unless-stopped

  server:
    container_name: sportradar-server
    build:
      context: ./server
      dockerfile: dockerfile
    environment:
      - PORT=8080
      - FILESERVER_ADDR=/files
      - DB_HOST=database
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=dev
    depends_on:
      database:
        condition: service_healthy
      fileserver:
        condition: service_started
    networks:
      - app
    restart: unless-stopped

  client:
    container_name: sportradar-client
    image: nginx:alpine
    ports:
      - "5050:5050"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro,z
      - ./client:/usr/share/nginx/html:ro,z
    depends_on:
      fileserver:
        condition: service_started
      server: 
        condition: service_started
    networks:
      - app
    restart: unless-stopped

volumes:
  sportradar-data:

networks:
  app:
