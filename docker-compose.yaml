services:
  database:
    container_name: sportradar-database
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dev 
      POSTGRES_USER: user 
      POSTGRES_PASSWORD: password 
    volumes:
      - sportradar-data:/var/lib/postgresql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro,z
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro,z
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dev"]
      interval: 10s
      timeout: 5s 
      retries: 3

  fileserver:
    container_name: sportradar-fileserver
    image: nginx:alpine 
    ports:
      - "9000:80"
    volumes:
      - ./storage:/usr/share/nginx/html:ro,z
    restart: unless-stopped

  server:
    container_name: sportradar-server
    ports:
      - "8080:8080"
    build:
      context: ./server
      dockerfile: dockerfile
    environment:
      - PORT=8080
      - FILESERVER_ADDR=http://localhost:9000
      - DB_HOST=database
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=dev
    depends_on:
      database:
        condition: service_started
      fileserver:
        condition: service_started
    restart: unless-stopped

  client:
    container_name: sportradar-client
    image: nginx:alpine
    ports:
      - "5050:80"
    volumes:
      - ./client:/usr/share/nginx/html:ro,z
    restart: unless-stopped
    depends_on:
      server: 
        condition: service_started

volumes:
  sportradar-data:
