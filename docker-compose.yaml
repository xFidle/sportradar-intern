services:
  database:
    container_name: sportradar-database
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dev 
      POSTGRES_USER: user 
      POSTGRES_PASSWORD: password 
    volumes:
      - sportradar-data:/var/lib/postgresql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro,z
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dev"]
      interval: 10s
      timeout: 5s 
      retries: 3

volumes:
  sportradar-data:

